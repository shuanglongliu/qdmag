dynamics:
    - T: 2.0          # Temperature in K
      lambdaa: 0.1    # Spin phonon coupling constant in cm-1
      I0: 1.e-4       # Prefactor for phonon density of states

    - tmin: 0.0       # Initial time in ps 
      tmax: 1.0       # Finial time in ps
      deltat: 0.01    # Time step in ps

    - save_mag: true   # Calculate and save magnetization during the dynamics ?
      deltat_mag: 0.02  # Calculate and save magnetization every delta_mag ps
      save_rho: true   # Save the density matrix ?
      deltat_rho: 0.1  # Save the density matrix every delta_rho ps

    - theta_B: 0.0    # Polar angle of the magnetic field
      phi_B: 0.0      # Azimuthal angle of the magnetic field

