fit_problem:
  - l_fit: true
    #  true: fit exchange coupling constants
    # false: do not fit exchange coupling constants
    n_par: 2
    initial_values: [-2.43, -5.18]
    lower_limits:   [-4.00, -7.00]
    upper_limits:   [-1.00, -3.00]
    current_values: [-2.43, -5.18]
    elements_to_vary:
        - pair: 1
          element: [0, 0]
        - pair: 4
          element: [0, 0]
    constrain_pairs: # Which pairs are the same in the specified reference frames
        - [1, 2, 3]
        - [4, 5, 6] 
    constrain_elements:
        # element2 = factor * element1
        # pair should be the first element of each entry of constrain_pairs if present there
        - pair: 1
          element1: [0, 0]
          element2: [1, 1]
          factor: 1
        - pair: 1
          element1: [0, 0]
          element2: [2, 2]
          factor: 1
        - pair: 4
          element1: [0, 0]
          element2: [1, 1]
          factor: 1
        - pair: 4
          element1: [0, 0]
          element2: [2, 2]
          factor: 1

  - l_fit: true
    #  true: fit ZFS parameters
    # false: do not fit ZFS parameters
    n_par: 4
    initial_values: [-0.03, 0.03, -0.01, 0.01] # B20, B22/B20 if B22 is to be fitted
    lower_limits:   [-0.50, 0.00, -0.05, 0.00] 
    upper_limits:   [-0.00, 1.00, -0.00, 1.00]
    current_values: [-0.03, 0.03, -0.01, 0.01]
    elements_to_vary:
        - site: 1
          i_Bkq: 0
          is_B22: false
        - site: 1
          i_Bkq: 1
          is_B22: true
        - site: 4
          i_Bkq: 0
          is_B22: false
        - site: 4
          i_Bkq: 1
          is_B22: true
    constrain_sites: # Which sites are the same in the specified reference frames
        - [1, 2, 3]

  - l_fit: true
    #  true: scale the experimental data by a linear factor [and add a linear constant if l_shift = true]
    # false: do not scale the experimental data
    l_shift: false # one entry if false for the options in the following four lines, two entries if true
    initial_values: [1.14]
    lower_limits: [1.00]
    upper_limits: [1.30]
    current_values: [1.14]

