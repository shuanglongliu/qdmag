BT_Bgrid:
  - [0., 10.0, 0.1, 0., 0.] # Bmin, Bmax, Bstep, thetaB, phiB 
  - [2.0] # [2.0, 10.0, 20.0, 40.0] # T1, T2, ..., Tn

BT_Tgrid:
  - [0., 0.5, 1., 0., 0.] # B1, B2, ..., Bn, thetaB, phiB
  - [0.2, 1, 0.2, 2, 10, 2, 20, 300, 20] # Tmin1, Tmax1, Tstep1, Tmin2, Tmax2, Tstep2, ..., Tminn, Tmaxn, Tstepn

dynamics:
    - T: 2.000          # Temperature in K
      lambdaa: 10.00   # Spin phonon coupling constant in cm-1
      I0: 1.0e-12     # Prefactor for phonon density of states. 1e-4

    - Bt_type: 'linear'  # Type of the magnetic pulse as a function of time. Options: 'linear', 'pwlinear', 'sin', 'pulse'
      sweep_rate: 5.0e-08  # Slope of the magnetic field vs time. Unit: T per ps. Used only when Bt = 'linear'.

    - tmin: 0.0e+00             # Initial time in ps
      tmax: 2.0e+08             # Finial time in ps
      deltat: 2.0e+04         # Time step in ps

    - save_mag: true # Calculate and save magnetization during the dynamics ?
      nt_mag: 1  # Calculate and save magnetization every nt_mag*deltat ps
      save_rho: false # Save the density matrix ?
      nt_rho: 10  # Save the density matrix every nt_rho*deltat ps, nt_rho will be adjusted to be a multiple of nt_mag

n_thread: 16 # Number of threads used in the calculation

